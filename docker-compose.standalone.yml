# DEPRECATED — Standalone mode is deprecated. MTClaw requires PostgreSQL.
# Use managed mode (docker-compose.managed.yml) instead.
# See: docs/00-foundation/product-vision.md — PG is core infrastructure.
#
# Original description:
# Standalone overlay — file-based storage with persistent volumes.
#
# Usage (DEPRECATED):
#   docker compose -f docker-compose.yml -f docker-compose.standalone.yml up

services:
  mtclaw:
    environment:
      - MTCLAW_POSTGRES_DSN=
      - MTCLAW_CONFIG=/app/config.json
    volumes:
      - ./config.json:/app/config.json:ro
      - mtclaw-workspace:/app/workspace
      - mtclaw-data:/app/data
      - mtclaw-sessions:/app/sessions
      - mtclaw-skills:/app/skills

volumes:
  mtclaw-workspace:
  mtclaw-data:
  mtclaw-sessions:
  mtclaw-skills:
