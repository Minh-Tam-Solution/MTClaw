# Upgrade overlay — one-shot database upgrade service.
#
# Usage:
#   # Preview changes (dry-run):
#   docker compose -f docker-compose.yml -f docker-compose.managed.yml -f docker-compose.upgrade.yml run --rm upgrade --dry-run
#
#   # Apply upgrade:
#   docker compose -f docker-compose.yml -f docker-compose.managed.yml -f docker-compose.upgrade.yml run --rm upgrade
#
#   # Check status:
#   docker compose -f docker-compose.yml -f docker-compose.managed.yml -f docker-compose.upgrade.yml run --rm upgrade --status
#
# The upgrade service runs mtclaw upgrade and exits. Use --rm to auto-remove the container.

services:
  upgrade:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "false"
    env_file:
      - path: .env
        required: false
    environment:
      - MTCLAW_MODE=managed
      - MTCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-mtclaw}:${POSTGRES_PASSWORD:-mtclaw}@postgres:5432/${POSTGRES_DB:-mtclaw}?sslmode=disable
      - MTCLAW_CONFIG=/app/data/config.json
      - MTCLAW_MIGRATIONS_DIR=/app/migrations
      - MTCLAW_ENCRYPTION_KEY=${MTCLAW_ENCRYPTION_KEY:-}
    volumes:
      - mtclaw-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/mtclaw"]
    command: ["upgrade"]
    restart: "no"
