# Base docker-compose — shared service definition.
# Combine with an overlay for your deployment mode:
#
#   Recommended (Managed + Web Dashboard):
#     docker compose -f docker-compose.yml -f docker-compose.managed.yml -f docker-compose.selfservice.yml up -d --build
#
#   Standalone:    docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d --build
#   Managed only:  docker compose -f docker-compose.yml -f docker-compose.managed.yml up -d --build
#   Managed+OTel:  docker compose -f docker-compose.yml -f docker-compose.managed.yml -f docker-compose.otel.yml up -d --build

services:
  mtclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "false"
        ENABLE_CLAUDE_CLI: "${ENABLE_CLAUDE_CLI:-false}"
    ports:
      - "${MTCLAW_PORT:-18790}:18790"
    env_file:
      - path: .env
        required: false
    environment:
      # Core
      - MTCLAW_HOST=0.0.0.0
      - MTCLAW_PORT=18790
      - MTCLAW_CONFIG=/app/data/config.json
      - MTCLAW_GATEWAY_TOKEN=${MTCLAW_GATEWAY_TOKEN:-}
      - MTCLAW_ENCRYPTION_KEY=${MTCLAW_ENCRYPTION_KEY:-}
      - MTCLAW_OWNER_IDS=${MTCLAW_OWNER_IDS:-}
      # Provider (at least one required)
      - MTCLAW_PROVIDER=${MTCLAW_PROVIDER:-}
      - MTCLAW_MODEL=${MTCLAW_MODEL:-}
      - MTCLAW_OPENROUTER_API_KEY=${MTCLAW_OPENROUTER_API_KEY:-}
      - MTCLAW_ANTHROPIC_API_KEY=${MTCLAW_ANTHROPIC_API_KEY:-}
      - MTCLAW_ANTHROPIC_BASE_URL=${MTCLAW_ANTHROPIC_BASE_URL:-}
      - MTCLAW_OPENAI_API_KEY=${MTCLAW_OPENAI_API_KEY:-}
      - MTCLAW_MINIMAX_API_KEY=${MTCLAW_MINIMAX_API_KEY:-}
      - MTCLAW_GROQ_API_KEY=${MTCLAW_GROQ_API_KEY:-}
      - MTCLAW_DEEPSEEK_API_KEY=${MTCLAW_DEEPSEEK_API_KEY:-}
      - MTCLAW_GEMINI_API_KEY=${MTCLAW_GEMINI_API_KEY:-}
      - MTCLAW_MISTRAL_API_KEY=${MTCLAW_MISTRAL_API_KEY:-}
      - MTCLAW_XAI_API_KEY=${MTCLAW_XAI_API_KEY:-}
      - MTCLAW_COHERE_API_KEY=${MTCLAW_COHERE_API_KEY:-}
      - MTCLAW_PERPLEXITY_API_KEY=${MTCLAW_PERPLEXITY_API_KEY:-}
      # Channels
      - MTCLAW_TELEGRAM_TOKEN=${MTCLAW_TELEGRAM_TOKEN:-}
      - MTCLAW_DISCORD_TOKEN=${MTCLAW_DISCORD_TOKEN:-}
      - MTCLAW_LARK_APP_ID=${MTCLAW_LARK_APP_ID:-}
      - MTCLAW_LARK_APP_SECRET=${MTCLAW_LARK_APP_SECRET:-}
      - MTCLAW_LARK_ENCRYPT_KEY=${MTCLAW_LARK_ENCRYPT_KEY:-}
      - MTCLAW_LARK_VERIFICATION_TOKEN=${MTCLAW_LARK_VERIFICATION_TOKEN:-}
      - MTCLAW_ZALO_TOKEN=${MTCLAW_ZALO_TOKEN:-}
      - MTCLAW_WHATSAPP_BRIDGE_URL=${MTCLAW_WHATSAPP_BRIDGE_URL:-}
      # Claude CLI fallback provider (Sprint 24 — ADR-014)
      - MTCLAW_CLAUDE_ENABLED=${MTCLAW_CLAUDE_ENABLED:-false}
      - MTCLAW_CLAUDE_PATH=${MTCLAW_CLAUDE_PATH:-claude}
      - MTCLAW_CLAUDE_MODEL=${MTCLAW_CLAUDE_MODEL:-sonnet}
      - MTCLAW_CLAUDE_TIMEOUT=${MTCLAW_CLAUDE_TIMEOUT:-120}
      - MTCLAW_PROVIDER_CHAIN=${MTCLAW_PROVIDER_CHAIN:-}
      # Debug
      - MTCLAW_TRACE_VERBOSE=${MTCLAW_TRACE_VERBOSE:-0}
    volumes:
      - mtclaw-data:/app/data
      - mtclaw-workspace:/app/workspace  # standalone mode workspace
      - claude-oauth:/app/.claude         # Claude CLI OAuth token persistence
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,size=256m  # noexec removed — Claude CLI subprocess needs it
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    restart: unless-stopped

volumes:
  mtclaw-data:
  mtclaw-workspace:
  claude-oauth:
