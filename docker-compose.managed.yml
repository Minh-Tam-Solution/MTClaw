# Managed overlay — PostgreSQL (pgvector) for multi-tenant storage.
#
# Recommended usage (with Web Dashboard):
#   docker compose -f docker-compose.yml -f docker-compose.managed.yml -f docker-compose.selfservice.yml up -d --build
#
# Required env vars (set in .env or shell):
#   GOCLAW_OPENROUTER_API_KEY (or another provider key)
#   POSTGRES_PASSWORD (defaults to "mtclaw" for dev)

services:
  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mtclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mtclaw}
      POSTGRES_DB: ${POSTGRES_DB:-mtclaw}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mtclaw:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GOCLAW_MODE=managed
      - GOCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-mtclaw}:${POSTGRES_PASSWORD:-mtclaw}@postgres:5432/${POSTGRES_DB:-mtclaw}?sslmode=disable
    volumes:
      - mtclaw-skills:/app/skills
      - mtclaw-workspace:/app/.mtclaw

volumes:
  postgres-data:
  mtclaw-skills:
