# Tailscale overlay — rebuilds with tsnet support for secure remote access.
#
# Usage (with managed mode):
#   docker compose -f docker-compose.yml -f docker-compose.managed.yml -f docker-compose.tailscale.yml up
#
# Required:
#   MTCLAW_TSNET_AUTH_KEY — Tailscale auth key (from https://login.tailscale.com/admin/settings/keys)
#
# Optional:
#   MTCLAW_TSNET_HOSTNAME — Tailscale device name (default: mtclaw-gateway)

services:
  mtclaw:
    build:
      args:
        ENABLE_TSNET: "true"
    environment:
      - MTCLAW_TSNET_HOSTNAME=${MTCLAW_TSNET_HOSTNAME:-mtclaw-gateway}
      - MTCLAW_TSNET_AUTH_KEY=${MTCLAW_TSNET_AUTH_KEY}
    volumes:
      - tsnet-state:/app/tsnet-state

volumes:
  tsnet-state:
